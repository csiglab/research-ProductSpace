<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Strategic Industrial Dossier</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            'slate': { 850: '#172033', 950: '#0a0f1a' },
            'brand': { DEFAULT: '#2563eb', light: '#3b82f6', dark: '#1d4ed8' },
            'accent': { DEFAULT: '#f59e0b', light: '#fbbf24' },
            'surface': { 50: '#f8fafc', 100: '#f1f5f9', 200: '#e2e8f0' }
          },
          fontFamily: {
            'display': ['"Playfair Display"', 'serif'],
            'body': ['Inter', 'sans-serif'],
            'mono': ['"JetBrains Mono"', 'monospace'],
          }
        }
      }
    }
  </script>
  <style>
    body { font-family: 'Inter', sans-serif; background-color: #f8fafc; color: #334155; }
    .font-display { font-family: 'Playfair Display', serif; }
    
    /* Custom Visualizations */
    .bar-chart-row {
      display: flex;
      align-items: center;
      margin-bottom: 0.75rem;
    }
    .bar-label { width: 120px; font-size: 0.875rem; color: #475569; flex-shrink: 0; }
    .bar-track { flex-grow: 1; height: 8px; background: #e2e8f0; border-radius: 4px; overflow: hidden; margin: 0 12px; }
    .bar-fill { height: 100%; border-radius: 4px; transition: width 1s ease-out; }
    
    .flow-arrow {
      position: relative;
    }
    .flow-arrow::after {
      content: '';
      position: absolute;
      right: -20px;
      top: 50%;
      transform: translateY(-50%);
      border: 6px solid transparent;
      border-left-color: #cbd5e1;
    }
    
    /* Gradient Text */
    .gradient-text {
      background: linear-gradient(135deg, #1e293b 0%, #475569 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    
    /* Card Hover Effects */
    .intel-card {
      transition: all 0.3s ease;
      border: 1px solid transparent;
    }
    .intel-card:hover {
      border-color: #3b82f6;
      box-shadow: 0 10px 25px -5px rgba(59, 130, 246, 0.1);
    }
  </style>
</head>
<body class="bg-surface-50">

  <!-- Top Navigation Bar -->
  <nav class="bg-white/80 backdrop-blur-lg border-b border-slate-200 sticky top-0 z-50">
    <div class="max-w-7xl mx-auto px-6 h-16 flex items-center justify-between">
      <div class="flex items-center gap-4">
        <div class="w-8 h-8 bg-brand rounded flex items-center justify-center">
          <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"/></svg>
        </div>
        <span class="font-display text-lg text-slate-800 font-bold tracking-tight">Industrial Intelligence Unit</span>
      </div>
      <div class="flex items-center gap-4 text-xs font-mono text-slate-500">
        <span>CLASSIFICATION: <span class="text-brand font-semibold">RESTRICTED</span></span>
        <span class="w-px h-4 bg-slate-200"></span>
        <span>DOSSIER ID: <span id="dossierId">PRD-2024-001</span></span>
      </div>
    </div>
  </nav>

  <main class="max-w-7xl mx-auto px-6 py-12">
    
    <!-- HEADER SECTION: Identity & Strategic Context -->
    <header id="mainHeader" class="mb-16"></header>

    <!-- MACRO SECTION: Global Market Dynamics -->
    <section class="mb-12">
      <div class="flex items-center gap-3 mb-6">
        <div class="w-1 h-8 bg-brand rounded-full"></div>
        <h2 class="font-display text-2xl text-slate-800">Global Market Dynamics</h2>
      </div>
      <div id="marketSection" class="grid grid-cols-1 lg:grid-cols-3 gap-6"></div>
    </section>

    <!-- PRODUCER SECTION: Market Landscape -->
    <section class="mb-12">
      <div class="flex items-center gap-3 mb-6">
        <div class="w-1 h-8 bg-accent rounded-full"></div>
        <h2 class="font-display text-2xl text-slate-800">Global Production Landscape</h2>
      </div>
      <div id="producerSection" class="bg-white rounded-xl shadow-sm border border-slate-100 p-8"></div>
    </section>

    <!-- TECHNICAL SECTION: Core & Requirements -->
    <section class="grid grid-cols-1 lg:grid-cols-2 gap-8 mb-12">
      <div id="techCore" class="bg-white rounded-xl shadow-sm border border-slate-100 p-8"></div>
      <div id="industrialReqs" class="bg-slate-50 rounded-xl border border-slate-200 p-8"></div>
    </section>

    <!-- SUPPLY CHAIN & INNOVATION -->
    <section class="grid grid-cols-1 lg:grid-cols-3 gap-8 mb-12">
      <div class="lg:col-span-2 bg-white rounded-xl shadow-sm border border-slate-100 p-8">
        <h3 class="font-display text-xl text-slate-800 mb-6 border-b border-slate-100 pb-4">Supply Chain Ecosystem</h3>
        <div id="supplyChainFlow"></div>
      </div>
      <div class="bg-slate-800 text-white rounded-xl shadow-lg p-8">
        <div id="innovationStats"></div>
      </div>
    </section>

    <!-- RELATED PRODUCTS -->
    <section class="mb-12">
       <h3 class="font-display text-xl text-slate-800 mb-6">Related Industrial Nodes</h3>
       <div id="relatedGrid" class="grid grid-cols-2 md:grid-cols-4 gap-4"></div>
    </section>

  </main>

  <script>
    // =============================================
    // EMBEDDED JSON DATA SOURCE
    // =============================================
    const productData = {
      "meta": {
        "id": "PRD-SMC-2044",
        "lastUpdated": "2024-05-15",
        "classification": "Strategic Resource"
      },
      "identity": {
        "name": "Advanced Semiconductors (Sub-7nm)",
        "category": "Electronics & Critical Infrastructure",
        "hsCode": "8542.31",
        "strategicImportance": "Critical",
        "description": "High-performance logic chips manufactured at sub-7nm process nodes. These components serve as the foundational infrastructure for advanced computing, artificial intelligence, defense systems, and next-generation telecommunications. Their production is concentrated in a handful of geopolitical regions, creating significant supply chain risk vectors.",
        "contextEssay": "The strategic value of sub-7nm semiconductors transcends their commercial market value. They act as force multipliers for economic productivity and military capability. As the world approaches the physical limits of Moore's Law, the complexity of production has created a high barrier to entry, effectively locking out nations without access to extreme ultraviolet (EUV) lithography technology. This technological asymmetry defines the current landscape of industrial power."
      },
      "globalMarket": {
        "currentValue": "$540 Billion",
        "cagr": "8.2%",
        "forecast2030": "$850 Billion",
        "dominance": "TSMC holds approximately 90% of sub-7nm manufacturing capacity.",
        "evolutionNarrative": "The market is shifting from a globalization model to a 'friend-shoring' model. Governments are intervening with subsidies (e.g., US CHIPS Act, EU Chips Act) to secure domestic supply.",
        "regionalDemand": [
          { "region": "North America", "share": 35 },
          { "region": "Asia Pacific", "share": 45 },
          { "region": "Europe", "share": 15 },
          { "region": "Rest of World", "share": 5 }
        ]
      },
      "majorProducers": [
        { "name": "TSMC (Taiwan)", "share": 58, "hq": "Taiwan", "capability": "Leading Edge (3nm)" },
        { "name": "Samsung Foundry", "share": 18, "hq": "South Korea", "capability": "Leading Edge (3nm)" },
        { "name": "Intel Foundry", "share": 12, "hq": "USA", "capability": "Advanced (Intel 4)" },
        { "name": "SMIC", "share": 6, "hq": "China", "capability": "Mature/Advanced (7nm*)" },
        { "name": "GlobalFoundries", "share": 6, "hq": "USA/UAE", "capability": "Specialized/Mature" }
      ],
      "technicalCore": {
        "barriers": "Extremely High",
        "processes": [
          { "name": "EUV Lithography", "maturity": "Early Production", "owner": "ASML (Monopoly)" },
          { "name": "Gate-All-Around (GAA)", "maturity": "R&D/Pilot", "owner": "Samsung/TSMC/Intel" },
          { "name": "High-NA EUV", "maturity": "R&D", "owner": "Intel/ASML" }
        ],
        "keyInputs": ["Ultra-pure Silicon Wafers", "Neon Gas (Ukraine source)", "Photoresists (Japan source)", "EUV Equipment"]
      },
      "industrialRequirements": {
        "capex": "$20B+ for a state-of-the-art fab.",
        "workforce": "PhD level material scientists and specialized process engineers.",
        "infrastructure": ["Ultra-reliable power grid (>99.999% uptime)", "Massive water purification capacity", "Seismic stability zones"],
        "timeline": "3-5 years to operational capacity."
      },
      "rdSpending": {
        "intensity": "High (15-20% of Revenue)",
        "totalSpend": "$100 Billion (Industry Annual)",
        "focusAreas": ["Miniaturization (Sub-2nm)", "Backside Power Delivery", "Chiplet Architectures", "Advanced Packaging"]
      },
      "substitutes": {
        "rating": "Low / None",
        "analysis": "For high-performance computing tasks, there are currently no viable substitutes to advanced silicon logic. Alternative architectures (Optical, Quantum) are decades from mass industrial deployment.",
        "options": ["Mature Node Chips (Performance penalty)", "FPGA (Flexibility over efficiency)"]
      },
      "supplyChain": {
        "upstream": [
          { "item": "EUV Lithography Tools", "source": "Netherlands (ASML)", "risk": "Critical Bottleneck" },
          { "item": "Photoresists", "source": "Japan (JSR/Tokyo Ohka)", "risk": "Moderate" }
        ],
        "downstream": [
          "Consumer Electronics",
          "Data Centers & Cloud",
          "Automotive (EVs)",
          "Defense Systems"
        ]
      },
      "relatedProducts": [
        { "id": "silicon-wafers", "name": "Silicon Wafers", "type": "Input" },
        { "id": "euv-equipment", "name": "Lithography Equipment", "type": "Capital Good" },
        { "id": "pcb-assembly", "name": "PCB Assembly", "type": "Downstream" }
      ]
    };

    // =============================================
    // RENDER ENGINE
    // =============================================

    function init() {
      // Render Header
      const h = productData.identity;
      document.getElementById('dossierId').innerText = productData.meta.id;
      
      document.getElementById('mainHeader').innerHTML = `
        <div class="flex flex-col lg:flex-row gap-8 items-start">
          <div class="flex-1">
            <div class="flex items-center gap-3 mb-4">
              <span class="px-3 py-1 text-xs font-bold bg-red-100 text-red-700 rounded-full uppercase tracking-wider border border-red-200">${productData.identity.strategicImportance}</span>
              <span class="text-xs text-slate-400 font-mono">HS: ${productData.identity.hsCode}</span>
            </div>
            <h1 class="font-display text-5xl font-bold text-slate-900 leading-tight mb-6">${h.name}</h1>
            <div class="prose text-lg text-slate-600 leading-relaxed space-y-4">
              <p>${h.description}</p>
              <p class="text-base text-slate-500 border-l-4 border-slate-200 pl-4 italic">${h.contextEssay}</p>
            </div>
          </div>
          <div class="w-full lg:w-72 bg-white border border-slate-200 rounded-lg p-5 shadow-sm">
            <h4 class="font-mono text-xs text-slate-400 uppercase tracking-wider mb-4">Quick Stats</h4>
            <div class="space-y-4">
              <div>
                <div class="text-xs text-slate-500 mb-1">Global Market Value</div>
                <div class="text-xl font-bold text-slate-800">${productData.globalMarket.currentValue}</div>
              </div>
              <div>
                <div class="text-xs text-slate-500 mb-1">Compound Annual Growth</div>
                <div class="text-xl font-bold text-brand">${productData.globalMarket.cagr}</div>
              </div>
              <div>
                <div class="text-xs text-slate-500 mb-1">Entry Barrier Level</div>
                <div class="text-xl font-bold text-red-600">${productData.technicalCore.barriers}</div>
              </div>
            </div>
          </div>
        </div>
      `;

      // Render Market Dynamics
      renderMarket();
      
      // Render Producers
      renderProducers();
      
      // Render Tech
      renderTech();
      
      // Render Supply Chain
      renderSupplyChain();
      
      // Render Innovation
      renderInnovation();
      
      // Render Related
      renderRelated();
    }

    function renderMarket() {
      const m = productData.globalMarket;
      const el = document.getElementById('marketSection');
      
      const regionBars = m.regionalDemand.map(r => `
        <div class="bar-chart-row">
          <div class="bar-label">${r.region}</div>
          <div class="bar-track">
            <div class="bar-fill bg-brand" style="width: ${r.share}%"></div>
          </div>
          <div class="font-mono text-sm text-slate-600 w-12 text-right">${r.share}%</div>
        </div>
      `).join('');

      el.innerHTML = `
        <!-- Narrative Card -->
        <div class="lg:col-span-2 bg-white rounded-xl shadow-sm border border-slate-100 p-8 intel-card">
          <h3 class="font-semibold text-slate-800 mb-4">Market Evolution Analysis</h3>
          <p class="text-slate-600 leading-relaxed mb-6">${m.evolutionNarrative}</p>
          <div class="bg-blue-50 border border-blue-100 rounded-lg p-4 text-sm text-blue-800 flex gap-3">
            <svg class="w-5 h-5 flex-shrink-0 text-blue-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
            <div><span class="font-bold">Key Insight:</span> ${m.dominance}</div>
          </div>
        </div>
        
        <!-- Demand Chart -->
        <div class="bg-white rounded-xl shadow-sm border border-slate-100 p-8 intel-card">
          <h3 class="font-semibold text-slate-800 mb-6">Regional Demand Share</h3>
          <div class="pt-2">
            ${regionBars}
          </div>
          <div class="mt-6 pt-4 border-t border-slate-100">
            <div class="flex justify-between text-xs text-slate-400">
              <span>Forecast 2030:</span>
              <span class="font-bold text-slate-600">${m.forecast2030}</span>
            </div>
          </div>
        </div>
      `;
    }

    function renderProducers() {
      const p = productData.majorProducers;
      const el = document.getElementById('producerSection');
      
      // Find max share for scaling bars
      const maxShare = Math.max(...p.map(x => x.share));

      const rows = p.map(company => `
        <div class="flex items-center group">
          <div class="w-40 flex-shrink-0 pr-4">
            <div class="font-medium text-slate-700 group-hover:text-brand transition-colors">${company.name}</div>
            <div class="text-xs text-slate-400">${company.hq}</div>
          </div>
          <div class="flex-grow">
             <div class="h-10 bg-slate-50 rounded relative overflow-hidden border border-slate-100">
               <div class="absolute inset-y-0 left-0 bg-gradient-to-r from-brand/80 to-brand rounded transition-all duration-1000" style="width: ${(company.share/maxShare)*100}%"></div>
               <div class="absolute inset-0 flex items-center px-4">
                 <span class="text-xs font-bold text-white drop-shadow-sm">${company.share}% Market Share</span>
               </div>
             </div>
          </div>
          <div class="w-40 flex-shrink-0 pl-4 text-right">
             <span class="text-xs font-mono text-slate-500 bg-slate-100 px-2 py-1 rounded">${company.capability}</span>
          </div>
        </div>
      `).join('');

      el.innerHTML = `
        <h3 class="font-semibold text-slate-800 mb-6">Market Share by Manufacturer</h3>
        <div class="space-y-4">
          ${rows}
        </div>
        <div class="mt-6 pt-4 border-t border-slate-100 flex items-center justify-between text-xs text-slate-400">
          <span>Data Source: Industrial Intelligence Unit (Simulated)</span>
          <span>Total Measured Capacity: 100%</span>
        </div>
      `;
    }

    function renderTech() {
      const t = productData.technicalCore;
      const r = productData.industrialRequirements;
      
      document.getElementById('techCore').innerHTML = `
        <h3 class="font-display text-xl text-slate-800 mb-6">Technical Core</h3>
        <div class="space-y-4 mb-6">
          <div class="flex justify-between border-b border-slate-100 pb-2">
            <span class="text-slate-600">Barriers to Entry</span>
            <span class="font-bold text-red-600">${t.barriers}</span>
          </div>
          <div>
            <span class="block text-xs text-slate-400 uppercase mb-2">Key Manufacturing Processes</span>
            <div class="space-y-2">
              ${t.processes.map(p => `
                <div class="bg-slate-50 p-3 rounded border border-slate-100">
                  <div class="flex justify-between items-center mb-1">
                    <span class="font-semibold text-sm text-slate-700">${p.name}</span>
                    <span class="text-xs text-brand bg-blue-50 px-2 py-0.5 rounded">${p.maturity}</span>
                  </div>
                  <div class="text-xs text-slate-400">Key Provider: ${p.owner}</div>
                </div>
              `).join('')}
            </div>
          </div>
        </div>
      `;

      document.getElementById('industrialReqs').innerHTML = `
        <h3 class="font-display text-xl text-slate-800 mb-6">Establishment Requirements</h3>
        <div class="space-y-4">
          <div class="bg-white p-4 rounded-lg border border-slate-200 shadow-sm">
            <div class="text-xs text-slate-400 uppercase mb-1">Capital Investment</div>
            <div class="text-lg font-bold text-slate-800">${r.capex}</div>
          </div>
          <div>
            <div class="text-xs text-slate-400 uppercase mb-2">Infrastructure Prerequisites</div>
            <ul class="space-y-2">
              ${r.infrastructure.map(i => `
                <li class="flex items-center gap-2 text-sm text-slate-600">
                  <svg class="w-4 h-4 text-brand" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/></svg>
                  ${i}
                </li>
              `).join('')}
            </ul>
          </div>
          <div class="mt-4 pt-4 border-t border-slate-200">
            <div class="flex justify-between items-center">
              <span class="text-sm text-slate-600">Time to Operational</span>
              <span class="font-mono font-bold text-accent">${r.timeline}</span>
            </div>
          </div>
        </div>
      `;
    }

    function renderSupplyChain() {
      const s = productData.supplyChain;
      const el = document.getElementById('supplyChainFlow');

      const renderFlowBox = (title, items, borderColor, bgColor) => `
        <div class="flex flex-col gap-3">
          <h4 class="text-xs font-bold uppercase text-slate-500 tracking-wider">${title}</h4>
          <div class="bg-${bgColor} border border-${borderColor}/20 rounded-lg p-3 space-y-2 flex-1">
            ${items.map(item => {
              const isObj = typeof item === 'object';
              const name = isObj ? item.item : item;
              const meta = isObj ? `<span class="block text-xs text-slate-400">${item.source}</span>` : '';
              const riskBadge = isObj && item.risk ? `<span class="text-xs bg-red-100 text-red-600 px-1 rounded">${item.risk}</span>` : '';
              
              return `
                <div class="bg-white p-2 rounded shadow-sm border border-slate-100">
                  <div class="flex justify-between items-center">
                    <span class="text-sm font-medium text-slate-700">${name}</span>
                    ${riskBadge}
                  </div>
                  ${meta}
                </div>
              `;
            }).join('')}
          </div>
        </div>
      `;

      el.innerHTML = `
        <div class="grid grid-cols-3 gap-6">
          ${renderFlowBox('Upstream Inputs', s.upstream, 'red', 'red-50')}
          
          <div class="flex flex-col items-center justify-center">
            <div class="w-12 h-12 rounded-full bg-brand/10 flex items-center justify-center mb-2">
              <svg class="w-6 h-6 text-brand" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10"/></svg>
            </div>
            <span class="text-xs font-bold text-slate-600">MANUFACTURING</span>
            <span class="text-xs text-slate-400 text-center mt-2">Concentrated in specific geopolitical zones</span>
          </div>

          ${renderFlowBox('Downstream Sectors', s.downstream, 'blue', 'blue-50')}
        </div>
      `;
    }

    function renderInnovation() {
      const rd = productData.rdSpending;
      const sub = productData.substitutes;
      const el = document.getElementById('innovationStats');

      el.innerHTML = `
        <div class="h-full flex flex-col">
          <div class="mb-6">
            <h3 class="font-display text-xl text-white mb-1">Innovation Index</h3>
            <div class="w-12 h-1 bg-accent rounded"></div>
          </div>
          
          <div class="grid grid-cols-2 gap-4 mb-6">
            <div>
              <div class="text-xs text-slate-400 uppercase">R&D Intensity</div>
              <div class="text-2xl font-bold text-white">${rd.intensity}</div>
            </div>
            <div>
              <div class="text-xs text-slate-400 uppercase">Annual Spend</div>
              <div class="text-2xl font-bold text-accent">${rd.totalSpend}</div>
            </div>
          </div>

          <div class="mb-6">
            <div class="text-xs text-slate-400 uppercase mb-2">Key Focus Areas</div>
            <div class="flex flex-wrap gap-2">
              ${rd.focusAreas.map(a => `<span class="px-2 py-1 bg-slate-700 text-slate-200 text-xs rounded">${a}</span>`).join('')}
            </div>
          </div>

          <div class="mt-auto bg-red-900/30 border border-red-700/50 rounded p-4">
            <h4 class="font-semibold text-red-300 text-sm mb-1">Substitution Risk: ${sub.rating}</h4>
            <p class="text-xs text-slate-300">${sub.analysis}</p>
          </div>
        </div>
      `;
    }

    function renderRelated() {
      const rel = productData.relatedProducts;
      const el = document.getElementById('relatedGrid');

      el.innerHTML = rel.map(p => `
        <a href="#" class="group block bg-white border border-slate-200 rounded-lg p-4 hover:border-brand hover:shadow-sm transition-all">
          <div class="flex justify-between items-start mb-2">
            <span class="text-xs font-mono text-slate-400 uppercase">${p.type}</span>
            <svg class="w-4 h-4 text-slate-300 group-hover:text-brand" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14"/></svg>
          </div>
          <div class="font-semibold text-slate-700 group-hover:text-brand">${p.name}</div>
        </a>
      `).join('');
    }

    init();
  </script>
</body>
</html>
