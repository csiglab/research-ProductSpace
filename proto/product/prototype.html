<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Strategic Product Profile</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Merriweather:ital,wght@0,300;0,400;0,700;1,400&family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            'base': { 50: '#f8fafc', 100: '#f1f5f9', 200: '#e2e8f0', 300: '#cbd5e1', 400: '#64748b', 500: '#475569', 600: '#334155', 700: '#1e293b', 800: '#0f172a', 900: '#020617' },
            'accent': { DEFAULT: '#0f766e', light: '#14b8a6', dark: '#0d9488' },
          },
          fontFamily: {
            'display': ['Merriweather', 'serif'],
            'body': ['Inter', 'sans-serif'],
            'mono': ['"JetBrains Mono"', 'monospace'],
          }
        }
      }
    }
  </script>
  <style>
    body { font-family: 'Inter', sans-serif; background-color: #f8fafc; color: #334155; }
    .font-display { font-family: 'Merriweather', serif; }
    
    /* Editorial Styles for the "Essay" feel */
    .prose-content p { margin-bottom: 1.25rem; line-height: 1.8; }
    .prose-content h2 { border-bottom: 1px solid #e2e8f0; padding-bottom: 0.5rem; margin-bottom: 1.5rem; margin-top: 3rem; }
    
    .data-card {
      background: white;
      border: 1px solid #e2e8f0;
      transition: all 0.2s ease;
    }
    .data-card:hover {
      border-color: #cbd5e1;
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
    }
  </style>
</head>
<body class="min-h-screen">

  <!-- Minimal Header -->
  <header class="bg-white/90 backdrop-blur-md border-b border-base-200 sticky top-0 z-50">
    <div class="max-w-6xl mx-auto px-6 h-16 flex items-center justify-between">
      <div class="flex items-center gap-3">
        <span class="font-mono text-xs text-base-400 uppercase tracking-widest font-semibold">Industrial Planning</span>
        <div class="h-4 w-px bg-base-200"></div>
        <span id="headerCategory" class="text-sm text-base-500 font-medium">Loading...</span>
      </div>
      <div class="flex items-center gap-2">
        <span class="text-xs text-base-400">Last Updated:</span>
        <span id="headerDate" class="font-mono text-xs text-base-600 bg-base-100 px-2 py-1 rounded">--</span>
      </div>
    </div>
  </header>

  <main class="max-w-6xl mx-auto px-6 py-12">
    
    <!-- Hero Section: The Product Identity -->
    <section id="productHero" class="mb-12 border-b border-base-200 pb-10">
      <!-- Rendered via JS -->
    </section>

    <!-- Section 1: Strategic Overview (The "Essay" Intro) -->
    <section id="strategicOverview" class="mb-12">
      <!-- Rendered via JS -->
    </section>

    <!-- Grid Layout for Data-Driven Sections -->
    <div class="grid grid-cols-1 lg:grid-cols-3 gap-8 mb-12">
      
      <!-- Main Column (Left) -->
      <div class="lg:col-span-2 space-y-8">
        
        <!-- Global Market & Evolution -->
        <div class="data-card rounded-lg overflow-hidden">
          <div class="bg-base-50 px-6 py-4 border-b border-base-200 flex items-center justify-between">
            <h3 class="font-display text-lg text-base-800">Global Market Landscape</h3>
            <span class="text-xs font-mono text-accent bg-accent/10 px-2 py-1 rounded">MARKET DATA</span>
          </div>
          <div id="marketDynamics" class="p-6 prose-content"></div>
        </div>

        <!-- Technical Core & Industrial Requirements -->
        <div class="data-card rounded-lg overflow-hidden">
          <div class="bg-base-50 px-6 py-4 border-b border-base-200">
            <h3 class="font-display text-lg text-base-800">Technical Core & Requirements</h3>
            <p class="text-xs text-base-400 mt-1">Prerequisites for industrial establishment and scaling.</p>
          </div>
          <div id="technicalSpecs" class="p-6 divide-y divide-base-100"></div>
        </div>

        <!-- Innovation & Substitution -->
        <div class="data-card rounded-lg overflow-hidden border-l-4 border-accent">
          <div class="px-6 py-4 border-b border-base-200 bg-accent/5">
            <h3 class="font-display text-lg text-accent-dark">Innovation & Substitution</h3>
          </div>
          <div id="innovationSection" class="p-6"></div>
        </div>

      </div>

      <!-- Sidebar Column (Right) -->
      <div class="lg:col-span-1 space-y-8">
        
        <!-- Major Producers -->
        <div class="data-card rounded-lg overflow-hidden">
          <div class="bg-base-50 px-5 py-3 border-b border-base-200">
            <h3 class="font-semibold text-base-700 text-sm uppercase tracking-wide">Major Global Producers</h3>
          </div>
          <div id="producerList" class="p-4"></div>
        </div>

        <!-- Supply Chain -->
        <div class="data-card rounded-lg overflow-hidden">
          <div class="bg-base-50 px-5 py-3 border-b border-base-200">
            <h3 class="font-semibold text-base-700 text-sm uppercase tracking-wide">Supply Chain Ecosystem</h3>
          </div>
          <div id="supplyChainMap" class="p-4 space-y-4"></div>
        </div>

        <!-- Related Products -->
        <div class="data-card rounded-lg overflow-hidden">
          <div class="bg-base-50 px-5 py-3 border-b border-base-200">
            <h3 class="font-semibold text-base-700 text-sm uppercase tracking-wide">Related Products</h3>
          </div>
          <div id="relatedProducts" class="p-4"></div>
        </div>

      </div>
    </div>

  </main>

  <script>
    // =============================================
    // DATA LOADING
    // =============================================
    async function init() {
      const params = new URLSearchParams(window.location.search);
      const productId = params.get('id') || 'semiconductors'; // Default fallback

      try {
        const response = await fetch(`../data/src/${productId}.json`);
        if (!response.ok) throw new Error('File not found');
        const data = await response.json();
        renderPage(data);
      } catch (err) {
        console.error(err);
        renderError(`Could not load data/src/${productId}.json`);
      }
    }

    function renderError(msg) {
      document.body.innerHTML = `<div class="p-10 text-center text-red-600 bg-red-50 m-10 rounded border border-red-200">${msg}</div>`;
    }

    // =============================================
    // RENDERING ORCHESTRATION
    // =============================================
    function renderPage(p) {
      document.title = `${p.name} | Strategic Profile`;
      document.getElementById('headerCategory').textContent = p.category || 'Industrial Good';
      document.getElementById('headerDate').textContent = p.lastUpdated || new Date().toISOString().split('T')[0];

      renderHero(p);
      renderStrategicOverview(p);
      renderMarketDynamics(p.globalMarket);
      renderTechnicalSpecs(p.technicalCore, p.industrialRequirements);
      renderInnovation(p.rdSpending, p.substitution);
      renderProducers(p.majorProducers);
      renderSupplyChain(p.supplyChain);
      renderRelated(p.relatedProducts);
    }

    // =============================================
    // SECTION RENDERERS
    // =============================================

    function renderHero(p) {
      const el = document.getElementById('productHero');
      el.innerHTML = `
        <div class="flex items-center gap-2 mb-4">
          <span class="font-mono text-xs bg-base-200 text-base-600 px-2 py-1 rounded uppercase tracking-wider">${p.id}</span>
          <span class="text-xs text-accent font-semibold">${p.strategicImportance || 'Critical Infrastructure'}</span>
        </div>
        <h1 class="font-display text-4xl font-bold text-base-900 tracking-tight mb-4">${p.name}</h1>
        <p class="text-xl text-base-600 leading-relaxed max-w-3xl">${p.description}</p>
      `;
    }

    function renderStrategicOverview(p) {
      const el = document.getElementById('strategicOverview');
      // This section creates the "Essay" feel by combining executive summary with context
      el.innerHTML = `
        <div class="prose-content">
          <h2 class="font-display text-2xl text-base-800 border-none pt-0 mt-0">Strategic Context</h2>
          <p class="text-base-600">${p.strategicContext || "This product represents a critical node in the modern industrial value chain. Its production and availability are directly linked to broader economic stability and technological sovereignty."}</p>
          
          <div class="grid grid-cols-2 gap-4 my-6 not-prose">
            <div class="bg-base-100 p-4 rounded border border-base-200">
              <div class="text-xs text-base-400 uppercase font-semibold mb-1">Market Maturity</div>
              <div class="text-lg font-bold text-base-800">${p.marketMaturity || 'Growth Phase'}</div>
            </div>
            <div class="bg-base-100 p-4 rounded border border-base-200">
              <div class="text-xs text-base-400 uppercase font-semibold mb-1">Barriers to Entry</div>
              <div class="text-lg font-bold text-base-800">${p.barriersToEntry || 'High'}</div>
            </div>
          </div>
        </div>
      `;
    }

    function renderMarketDynamics(m) {
      if(!m) return;
      const el = document.getElementById('marketDynamics');
      
      el.innerHTML = `
        <div class="grid grid-cols-3 gap-4 mb-6 text-center">
          <div class="bg-base-50 p-3 rounded">
            <div class="text-2xl font-bold text-base-800">${m.globalMarketSize || 'N/A'}</div>
            <div class="text-xs text-base-400">Market Size</div>
          </div>
          <div class="bg-base-50 p-3 rounded">
            <div class="text-2xl font-bold text-accent">${m.cagr || 'N/A'}</div>
            <div class="text-xs text-base-400">CAGR</div>
          </div>
          <div class="bg-base-50 p-3 rounded">
            <div class="text-2xl font-bold text-base-800">${m.projected20230 || 'N/A'}</div>
            <div class="text-xs text-base-400">2030 Projection</div>
          </div>
        </div>
        
        <h4 class="font-semibold text-base-700 mb-2">Market Evolution</h4>
        <p class="text-sm text-base-600 mb-4">${m.evolutionNarrative || "The market is undergoing significant structural shifts driven by geopolitical realignments and technological transitions."}</p>
        
        <div class="bg-accent/5 border-l-4 border-accent p-4 rounded-r">
          <h5 class="font-semibold text-accent-dark text-sm mb-1">Key Trends</h5>
          <ul class="list-disc list-inside text-sm text-base-600 space-y-1">
            ${m.keyTrends ? m.keyTrends.map(t => `<li>${t}</li>`).join('') : '<li>Market consolidation</li><li>Regional diversification</li>'}
          </ul>
        </div>
      `;
    }

    function renderTechnicalSpecs(tc, req) {
      const el = document.getElementById('technicalSpecs');
      
      // Processes
      const processes = (tc?.processes || []).map(p => `
        <div class="flex justify-between items-center py-2">
          <div class="flex items-center gap-2">
            <span class="w-2 h-2 rounded-full bg-accent"></span>
            <span class="font-medium text-base-700">${p.name}</span>
          </div>
          <span class="text-xs font-mono bg-base-100 text-base-500 px-2 py-1 rounded">${p.techReadiness || 'TRL 7'}</span>
        </div>
      `).join('');

      // Requirements
      const requirements = (req?.keyRequirements || []).map(r => `
        <li class="flex items-start gap-2 text-sm text-base-600">
          <svg class="w-4 h-4 text-base-300 mt-0.5 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
          ${r}
        </li>
      `).join('');

      el.innerHTML = `
        <div class="mb-6">
          <h4 class="text-xs font-bold text-base-400 uppercase tracking-wider mb-3">Core Manufacturing Processes</h4>
          <div class="space-y-1 bg-base-50 p-3 rounded">
            ${processes || '<p class="text-sm text-base-400 italic">Process data unavailable</p>'}
          </div>
        </div>
        
        <div>
          <h4 class="text-xs font-bold text-base-400 uppercase tracking-wider mb-3">Industrial Prerequisites</h4>
          <ul class="space-y-2 pl-1">
            ${requirements || '<p class="text-sm text-base-400 italic">Requirements data unavailable</p>'}
          </ul>
        </div>

        <div class="mt-6 pt-4 border-t border-base-100">
          <div class="flex flex-wrap gap-2">
            ${(tc?.materials || []).map(m => `<span class="px-2 py-1 bg-white border border-base-200 text-xs font-mono text-base-600 rounded">${m}</span>`).join('')}
          </div>
        </div>
      `;
    }

    function renderInnovation(rd, sub) {
      const el = document.getElementById('innovationSection');
      
      el.innerHTML = `
        <div class="grid grid-cols-2 gap-4 mb-6">
          <div>
            <div class="text-xs text-base-400 uppercase mb-1">Global R&D Intensity</div>
            <div class="text-xl font-bold text-base-800">${rd?.intensity || 'High'}</div>
            <div class="text-xs text-base-500 mt-1">${rd?.trend || 'Increasing focus on efficiency'}</div>
          </div>
          <div>
            <div class="text-xs text-base-400 uppercase mb-1">Key Innovation Areas</div>
            <div class="text-sm font-medium text-base-700">${rd?.focusAreas ? rd.focusAreas.join(', ') : 'Process Optimization'}</div>
          </div>
        </div>

        <div class="bg-warning/10 p-4 rounded border border-warning/20">
          <h4 class="font-semibold text-warning text-sm mb-2 flex items-center gap-2">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7h12m0 0l-4-4m4 4l-4 4m0 6H4m0 0l4 4m-4-4l4-4"/></svg>
            Substitution Possibilities
          </h4>
          <p class="text-sm text-base-600 mb-2">${sub?.narrative || "Substitution options are currently limited due to performance requirements."}</p>
          <div class="flex flex-wrap gap-2">
            ${(sub?.alternatives || ['None Viable']).map(a => `<span class="px-2 py-0.5 bg-white text-xs font-medium text-base-600 rounded border border-base-200">${a}</span>`).join('')}
          </div>
        </div>
      `;
    }

    function renderProducers(producers) {
      const el = document.getElementById('producerList');
      if(!producers || producers.length === 0) {
        el.innerHTML = `<div class="text-sm text-base-400 italic">No producer data available</div>`;
        return;
      }

      el.innerHTML = `
        <ul class="space-y-3">
          ${producers.map(p => `
            <li class="flex items-center justify-between p-2 rounded hover:bg-base-50">
              <div>
                <div class="font-medium text-base-700">${p.name}</div>
                <div class="text-xs text-base-400">${p.region || 'Global'}</div>
              </div>
              <div class="text-right">
                <div class="text-sm font-semibold text-accent">${p.marketShare || 'N/A'}</div>
                <div class="text-xs text-base-400">Share</div>
              </div>
            </li>
          `).join('')}
        </ul>
      `;
    }

    function renderSupplyChain(sc) {
      const el = document.getElementById('supplyChainMap');
      if(!sc) return;

      el.innerHTML = `
        <div class="space-y-4">
          <div>
            <h5 class="text-xs font-bold text-base-400 uppercase mb-2">Upstream Dependencies</h5>
            <div class="space-y-1">
              ${(sc.upstream || []).map(u => `
                <div class="flex justify-between items-center text-sm">
                  <span class="text-base-600">${u.name}</span>
                  <span class="text-xs font-mono text-base-400">${u.criticality || 'Standard'}</span>
                </div>
              `).join('')}
            </div>
          </div>
          <div class="border-t border-base-100 pt-4">
            <h5 class="text-xs font-bold text-base-400 uppercase mb-2">Downstream Sectors</h5>
            <div class="flex flex-wrap gap-2">
              ${(sc.downstream || []).map(d => `<span class="px-2 py-1 bg-base-100 text-xs text-base-600 rounded">${d}</span>`).join('')}
            </div>
          </div>
        </div>
      `;
    }

    function renderRelated(rp) {
      const el = document.getElementById('relatedProducts');
      if(!rp || rp.length === 0) {
        el.innerHTML = `<div class="text-sm text-base-400 italic">No related products defined</div>`;
        return;
      }

      el.innerHTML = `
        <ul class="space-y-2">
          ${rp.map(r => `
            <li>
              <a href="?id=${r.id}" class="flex items-center gap-2 text-sm text-accent hover:text-accent-dark transition-colors group">
                <svg class="w-4 h-4 text-base-300 group-hover:text-accent" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.828 10.172a4 4 0 00-5.656 0l-4 4a4 4 0 105.656 5.656l1.102-1.101m-.758-4.899a4 4 0 005.656 0l4-4a4 4 0 00-5.656-5.656l-1.1 1.1"/></svg>
                ${r.name}
              </a>
            </li>
          `).join('')}
        </ul>
      `;
    }

    init();
  </script>
</body>
</html>
