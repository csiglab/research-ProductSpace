<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Strategic Industrial Planner</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Merriweather:ital,wght@0,300;0,400;0,700;1,400&family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            'base': { 50: '#f8fafc', 100: '#f1f5f9', 200: '#e2e8f0', 300: '#cbd5e1', 400: '#64748b', 500: '#475569', 600: '#334155', 700: '#1e293b', 800: '#0f172a', 900: '#020617' },
            'accent': { DEFAULT: '#0f766e', light: '#14b8a6', dark: '#0d9488' },
            'danger': { DEFAULT: '#dc2626', light: '#fecaca', bg: '#fef2f2' },
            'warning': { DEFAULT: '#d97706', light: '#fef3c7', bg: '#fffbeb' },
            'success': { DEFAULT: '#16a34a', light: '#bbf7d0', bg: '#f0fdf4' }
          },
          fontFamily: {
            'display': ['Merriweather', 'serif'],
            'body': ['Inter', 'sans-serif'],
            'mono': ['"JetBrains Mono"', 'monospace'],
          }
        }
      }
    }
  </script>
  <style>
    body { font-family: 'Inter', sans-serif; background-color: #f1f5f9; color: #334155; }
    .font-display { font-family: 'Merriweather', serif; }
    
    .status-card {
      position: relative;
      background: white;
      border-radius: 8px;
      overflow: hidden;
    }
    .status-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0; height: 4px;
    }
    .status-card.critical::before { background: linear-gradient(90deg, #dc2626, #f87171); }
    .status-card.warning::before { background: linear-gradient(90deg, #d97706, #fbbf24); }
    .status-card.stable::before { background: linear-gradient(90deg, #16a34a, #4ade80); }

    .metric-bar {
      height: 6px;
      border-radius: 3px;
      background: #e2e8f0;
      overflow: hidden;
    }
    .metric-bar-fill {
      height: 100%;
      border-radius: 3px;
    }
  </style>
</head>
<body class="min-h-screen">

  <header class="bg-white/80 backdrop-blur-md border-b border-base-200 sticky top-0 z-50">
    <div class="max-w-7xl mx-auto px-6 h-16 flex items-center justify-between">
      <div class="flex items-center gap-4">
        <a href="index.html" class="text-base-400 hover:text-accent transition-colors flex items-center gap-1 text-sm font-medium">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"/></svg>
          Registry
        </a>
        <div class="h-5 w-px bg-base-200"></div>
        <span class="font-mono text-xs text-base-400 uppercase tracking-widest">Capability Dossier</span>
      </div>
      <div class="flex items-center gap-3">
        <span id="headerStatus" class="hidden px-2 py-1 text-xs font-semibold rounded-full"></span>
        <span id="headerProductName" class="font-display text-base-700 font-medium">Loading...</span>
      </div>
    </div>
  </header>

  <main class="max-w-7xl mx-auto px-6 py-8">
    
    <section id="strategicHeader" class="mb-8"></section>

    <section class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-8">
      <div id="metricCapacity" class="status-card critical p-4 border border-base-200 shadow-sm"></div>
      <div id="metricImport" class="status-card critical p-4 border border-base-200 shadow-sm"></div>
      <div id="metricMarket" class="status-card stable p-4 border border-base-200 shadow-sm"></div>
      <div id="metricTime" class="status-card warning p-4 border border-base-200 shadow-sm"></div>
    </section>

    <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
      
      <div class="lg:col-span-2 space-y-8">
        
        <div class="bg-white rounded-lg border border-base-200 overflow-hidden shadow-sm">
          <div class="bg-base-50 px-6 py-4 border-b border-base-200 flex items-center justify-between">
            <h3 class="font-display text-lg text-base-800">Risk & Bottleneck Analysis</h3>
            <span class="text-xs font-mono text-base-400 bg-base-100 px-2 py-1 rounded">INTELLIGENCE</span>
          </div>
          <div id="riskMatrix" class="p-6 grid grid-cols-1 md:grid-cols-2 gap-6"></div>
        </div>

        <div class="bg-white rounded-lg border border-base-200 overflow-hidden shadow-sm">
          <div class="bg-base-50 px-6 py-4 border-b border-base-200">
            <h3 class="font-display text-lg text-base-800">Industrial Requirements</h3>
            <p class="text-xs text-base-400 mt-1">Technical prerequisites for establishing domestic production.</p>
          </div>
          <div id="technicalSpecs" class="p-6"></div>
        </div>

        <div class="bg-accent/5 rounded-lg border border-accent/20 overflow-hidden shadow-sm">
          <div class="bg-accent/10 px-6 py-4 border-b border-accent/20 flex items-center gap-3">
            <svg class="w-5 h-5 text-accent" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"/></svg>
            <h3 class="font-display text-lg text-accent-dark">Policy Interventions</h3>
          </div>
          <div id="policyActions" class="p-6 space-y-4"></div>
        </div>

      </div>

      <div class="lg:col-span-1 space-y-8">
        
        <div class="bg-white rounded-lg border border-base-200 overflow-hidden shadow-sm">
          <div class="bg-base-50 px-6 py-4 border-b border-base-200">
            <h3 class="font-display text-base-800">Supply Chain Ecosystem</h3>
          </div>
          <div id="ecosystemMap" class="p-4 space-y-4"></div>
        </div>

        <div class="bg-white rounded-lg border border-base-200 overflow-hidden shadow-sm">
          <div class="bg-base-50 px-6 py-4 border-b border-base-200">
            <h3 class="font-display text-base-800">Global Landscape</h3>
          </div>
          <div id="competitionMap" class="p-4"></div>
        </div>

      </div>
    </div>
  </main>

  <script>
    // =============================================
    // INITIALIZATION
    // =============================================
    async function init() {
      const params = new URLSearchParams(window.location.search);
      const productId = params.get('id');

      if (!productId) {
        renderError("No Product ID specified in URL.");
        return;
      }

      try {
        const response = await fetch(`../data/src/${productId}.json`);
        if (!response.ok) throw new Error('File not found');
        const data = await response.json();
        
        renderPage(data);
      } catch (err) {
        console.error(err);
        renderError(`Could not load data/src/${productId}.json`);
      }
    }

    function renderError(msg) {
      document.body.innerHTML = `<div class="p-10 text-center text-red-600 bg-red-50 m-10 rounded border border-red-200">${msg}</div>`;
    }

    // =============================================
    // RENDERING MAIN ORCHESTRATOR
    // =============================================
    function renderPage(p) {
      document.title = `${p.name} | Strategic Briefing`;
      document.getElementById('headerProductName').textContent = p.name;
      
      // Set Header Status Badge
      const statusEl = document.getElementById('headerStatus');
      const priority = p.strategicMetrics?.strategicPriority || 'Standard';
      statusEl.textContent = priority;
      statusEl.classList.remove('hidden');
      if(priority === 'Critical') {
        statusEl.className = "px-2 py-1 text-xs font-semibold rounded-full bg-danger-bg text-danger";
      } else {
        statusEl.className = "px-2 py-1 text-xs font-semibold rounded-full bg-warning-bg text-warning";
      }

      renderHeader(p);
      renderMetrics(p.strategicMetrics);
      renderRisks(p.riskProfile);
      renderTechnical(p.technicalCore);
      renderPolicy(p.policyLever);
      renderEcosystem(p.ecosystem);
      
      // FIXED: Pass the full ecosystem object instead of just leaders
      // so we can access localPlayers inside the function
      renderCompetition(p.ecosystem); 
    }

    function renderHeader(p) {
      const container = document.getElementById('strategicHeader');
      container.innerHTML = `
        <div class="bg-white p-6 rounded-lg border border-base-200 shadow-sm">
          <div class="flex items-start justify-between">
            <div>
              <div class="flex items-center gap-2 mb-2">
                <span class="px-2 py-0.5 text-xs font-mono bg-base-100 text-base-500 rounded border border-base-200">${p.id}</span>
                <span class="text-xs text-base-400">${p.category}</span>
              </div>
              <h1 class="font-display text-3xl font-bold text-base-900 tracking-tight mb-2">${p.name}</h1>
              <p class="text-base-600 text-lg leading-relaxed">${p.description}</p>
            </div>
          </div>
        </div>
      `;
    }

    function renderMetrics(m) {
      if(!m) return;
      
      const createMetricCard = (id, title, value, max, colorClass, subtitle) => {
        const el = document.getElementById(id);
        const valNum = parseFloat(value);
        const width = max ? (valNum / max * 100) : 100;
        
        el.innerHTML = `
          <div class="flex justify-between items-start mb-2">
            <span class="text-xs font-medium text-base-400 uppercase tracking-wide">${title}</span>
          </div>
          <div class="text-2xl font-bold text-base-800 mb-2">${value}${max ? '%' : ''}</div>
          <div class="metric-bar mb-2">
            <div class="metric-bar-fill ${colorClass}" style="width: ${width}%"></div>
          </div>
          <div class="text-xs text-base-400">${subtitle}</div>
        `;
      };

      createMetricCard('metricCapacity', 'Domestic Capacity', m.domesticCapacity, 100, 'bg-danger', 'Current operational output');
      createMetricCard('metricImport', 'Import Dependency', m.importDependency, 100, 'bg-warning', 'Reliance on foreign sources');
      createMetricCard('metricMarket', 'Global Share', m.globalMarketShare, 100, 'bg-success', 'National production footprint');
      document.getElementById('metricTime').innerHTML = `
        <div class="flex justify-between items-start mb-2">
          <span class="text-xs font-medium text-base-400 uppercase tracking-wide">Time to Scale</span>
        </div>
        <div class="text-2xl font-bold text-base-800 mb-2">${m.timeToScale}</div>
        <div class="text-xs text-base-400">Est. to reach 50% capacity</div>
      `;
    }

    function renderRisks(r) {
      if(!r) return;
      const container = document.getElementById('riskMatrix');
      
      const riskBadge = (level) => {
        if(level === 'Critical') return '<span class="px-2 py-1 text-xs font-bold rounded bg-danger-bg text-danger">Critical</span>';
        if(level === 'High') return '<span class="px-2 py-1 text-xs font-bold rounded bg-danger-light text-danger-dark">High</span>';
        return '<span class="px-2 py-1 text-xs font-bold rounded bg-success-bg text-success">Low</span>';
      };

      container.innerHTML = `
        <div class="space-y-3">
          <h4 class="font-semibold text-base-700 text-sm">Risk Factors</h4>
          <div class="space-y-2">
            <div class="flex justify-between items-center p-2 bg-base-50 rounded">
              <span class="text-sm text-base-600">Geopolitical Exposure</span>
              ${riskBadge(r.geopolitical)}
            </div>
            <div class="flex justify-between items-center p-2 bg-base-50 rounded">
              <span class="text-sm text-base-600">Supply Chain Fragility</span>
              ${riskBadge(r.supplyChain)}
            </div>
            <div class="flex justify-between items-center p-2 bg-base-50 rounded">
              <span class="text-sm text-base-600">Substitutability</span>
              ${riskBadge(r.substitutability)}
            </div>
          </div>
        </div>
        <div class="bg-danger-bg border border-danger/20 rounded p-4">
          <h4 class="font-semibold text-danger-dark text-sm mb-1 flex items-center gap-2">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"/></svg>
            Critical Bottleneck
          </h4>
          <p class="text-sm text-danger-dark">${r.keyBottleneck}</p>
        </div>
      `;
    }

    function renderTechnical(tc) {
      if(!tc) return;
      const container = document.getElementById('technicalSpecs');

      const processHtml = tc.processes.map(p => `
        <div class="flex justify-between items-start py-2 border-b border-base-100 last:border-0">
          <div>
            <span class="font-mono text-sm font-medium text-base-700">${p.name}</span>
            <span class="ml-2 text-xs text-base-400">Maturity: ${p.maturity}</span>
          </div>
          <span class="px-2 py-0.5 text-xs rounded ${p.barrier === 'High' ? 'bg-danger-light text-danger-dark' : 'bg-base-100 text-base-500'}">${p.barrier} Barrier</span>
        </div>
      `).join('');

      container.innerHTML = `
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
          <div>
            <h4 class="text-xs font-bold text-base-400 uppercase tracking-wider mb-3">Key Materials</h4>
            <div class="flex flex-wrap gap-2">
              ${tc.materials.map(m => `<span class="px-2 py-1 bg-base-100 text-base-600 text-xs font-mono rounded border border-base-200">${m}</span>`).join('')}
            </div>
          </div>
          <div>
            <h4 class="text-xs font-bold text-base-400 uppercase tracking-wider mb-3">Standards</h4>
            <div class="space-y-1">
              ${tc.standards.map(s => `<div class="text-sm text-base-600">${s}</div>`).join('')}
            </div>
          </div>
        </div>
        <div class="mt-6">
          <h4 class="text-xs font-bold text-base-400 uppercase tracking-wider mb-3">Manufacturing Processes</h4>
          <div class="bg-base-50 p-3 rounded border border-base-100">
            ${processHtml}
          </div>
        </div>
      `;
    }

    function renderPolicy(pl) {
      if(!pl) return;
      const container = document.getElementById('policyActions');
      
      container.innerHTML = `
        <div class="space-y-4">
           <div class="flex items-center gap-4 text-sm">
             <span class="font-medium text-base-500">Current Tariffs:</span>
             <span class="font-mono bg-base-100 px-2 py-1 rounded">${pl.currentTariffs}</span>
           </div>
           <div>
             <span class="text-xs font-bold text-base-400 uppercase tracking-wider block mb-2">Available Incentives</span>
             <div class="flex flex-wrap gap-2">
               ${pl.incentives.map(i => `<span class="px-3 py-1 bg-white border border-accent/30 text-accent-dark text-xs font-medium rounded-full shadow-sm">${i}</span>`).join('')}
             </div>
           </div>
           <div class="pt-4 border-t border-accent/20">
             <span class="text-xs font-bold text-accent-dark uppercase tracking-wider block mb-2">Recommended Actions</span>
             <ul class="space-y-2">
               ${pl.recommendations.map(r => `
                 <li class="flex items-start gap-2 text-sm text-base-700">
                   <svg class="w-4 h-4 text-accent mt-0.5 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
                   ${r}
                 </li>
               `).join('')}
             </ul>
           </div>
        </div>
      `;
    }

    function renderEcosystem(eco) {
      if(!eco) return;
      const container = document.getElementById('ecosystemMap');
      
      const renderItem = (item, type) => {
        const statusColors = {
          'At Risk': 'bg-danger-bg text-danger',
          'Growing': 'bg-success-bg text-success',
          'Stable': 'bg-base-100 text-base-500'
        };
        
        return `
          <div class="flex justify-between items-center p-2 rounded hover:bg-base-50">
            <span class="text-sm font-medium text-base-700">${item.name}</span>
            <span class="text-xs px-2 py-0.5 rounded ${statusColors[item.status] || 'bg-base-100'}">${item.status}</span>
          </div>
        `;
      };

      container.innerHTML = `
        <div class="space-y-3">
          <div>
            <h4 class="text-xs font-bold text-base-400 uppercase mb-2">Upstream Dependencies</h4>
            <div class="space-y-1 border-l-2 border-danger/50 pl-3">
              ${eco.upstream.map(u => renderItem(u, 'up')).join('')}
            </div>
          </div>
          <div class="pt-2">
            <h4 class="text-xs font-bold text-base-400 uppercase mb-2">Downstream Markets</h4>
            <div class="space-y-1 border-l-2 border-accent/50 pl-3">
              ${eco.downstream.map(d => renderItem(d, 'down')).join('')}
            </div>
          </div>
        </div>
      `;
    }

    // FIXED: Accept the full ecosystem object
    function renderCompetition(eco) {
      if(!eco) return;
      const container = document.getElementById('competitionMap');
      
      // Extract leaders and locals safely
      const leaders = eco.globalLeaders || [];
      const locals = eco.localPlayers || [];

      container.innerHTML = `
        <div class="space-y-3">
           <h4 class="text-xs font-bold text-base-400 uppercase mb-2">Global Market Leaders</h4>
           <div class="space-y-2">
             ${leaders.map(l => `
               <div class="flex items-center justify-between bg-base-50 p-2 rounded border border-base-100">
                 <span class="text-sm text-base-700 font-medium">${l}</span>
                 <span class="text-xs text-base-400">Foreign</span>
               </div>
             `).join('')}
           </div>
           <div class="mt-4 pt-4 border-t border-base-100">
             <div class="text-xs text-base-400 mb-1">Domestic Players</div>
             <div class="text-sm font-semibold text-accent-dark">${locals.join(', ') || 'Limited Presence'}</div>
           </div>
        </div>
      `;
    }

    init();
  </script>
</body>
</html>
